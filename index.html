<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Davies Villa</title>
    <link rel="stylesheet" href="styles/villa-ui.css" />
    <script src="script/aframe.min.js"></script>
    <script src="script/pool-water.js"></script>
    <script src="script/teleport-nav.js"></script>
  </head>
  <body>
    <a-scene
      id="villaScene"
      renderer="colorManagement: true; physicallyCorrectLights: true; antialias: false; precision: mediump; powerPreference: high-performance"
      adaptive-renderer
      villa-teleport-nav="rig: #cameraRig; roomHud: #roomHud; navPanel: #hudBody; navToggle: #hudToggle; effect: #teleportFx"
    >
      <div id="teleportFx"></div>
      <div id="villaHud">
        <div class="hud-top">
          <div>
            <div class="hud-title">Villa Navigator</div>
            <div id="roomHud">Current: Outside</div>
          </div>
          <button
            id="hudToggle"
            type="button"
            aria-label="Toggle room navigation"
          >
            Hide
          </button>
        </div>
        <div id="hudBody">
          <div id="miniMap">
            <div class="map-floor-row">
              <button class="floor-chip" data-room="living" type="button">
                Ground Floor
              </button>
              <button class="floor-chip" data-room="bedroom1" type="button">
                Upper Floor
              </button>
            </div>
            <div class="map-canvas" id="mapCanvas">
              <div class="map-grid"></div>
              <div class="floor-box ground"></div>
              <div class="floor-box upper"></div>

              <button class="map-point living" data-room="living">
                Living
              </button>
              <button class="map-point kitchen" data-room="kitchen">
                Kitchen
              </button>
              <button class="map-point bedroom1" data-room="bedroom1">
                Bedroom 1
              </button>
              <button class="map-point neon" data-room="neon">Bedroom 2</button>
              <button class="map-point outside" data-room="outside">
                Outside
              </button>
            </div>
          </div>
          <div class="hud-note">
            Click map nodes to jump rooms. Keys: 1-5. Press M to collapse.
          </div>
        </div>
      </div>
      <a-assets>
        <a-asset-item
          id="benchModel"
          src="models/bench_low_poly.glb"
          alt="Low poly bench model"
        ></a-asset-item>
        <a-asset-item
          id="deckChairModel"
          src="models/deck_chair.glb"
          alt="Deck chair model"
        ></a-asset-item>
        <a-asset-item
          id="greenBushModel"
          src="models/green_bush.glb"
          alt="Green bush model"
        ></a-asset-item>
        <a-asset-item
          id="kitchenModel"
          src="models/kitchen_low_poly.glb"
          alt="Low poly kitchen model"
        ></a-asset-item>
        <a-asset-item
          id="flowerBushesModel"
          src="models/lowpoly_flower_bushes.glb"
          alt="Low poly flower bushes model"
        ></a-asset-item>
        <a-asset-item
          id="isometricRoomModel"
          src="models/low_poly_isometric_room.glb"
          alt="Low poly isometric room model"
        ></a-asset-item>
        <a-asset-item
          id="livingRoomModel"
          src="models/low_poly_living_room_with_furniture1k.glb"
          alt="Low poly living room with furniture model"
        ></a-asset-item>
        <a-asset-item
          id="mailboxModel"
          src="models/low_poly_mailbox.glb"
          alt="Low poly mailbox model"
        ></a-asset-item>
        <a-asset-item
          id="villaModel"
          src="models/modern_luxury_villa_house_building_home.glb"
          alt="Modern luxury villa building model"
        ></a-asset-item>
        <a-asset-item
          id="neonBedroomModel"
          src="models/neon_bedroom.glb"
          alt="Neon bedroom model"
        ></a-asset-item>
        <a-asset-item
          id="streetLampModel"
          src="models/street_lamp_3d_model.glb"
          alt="Street lamp model"
        ></a-asset-item>
        <a-asset-item
          id="stylizedStreetLightModel"
          src="models/stylized_street_light.glb"
          alt="Stylized street light model"
        ></a-asset-item>
        <a-asset-item
          id="carModel"
          src="models/subaru_legacy_wagon.glb"
          alt="Subaru legacy wagon car model"
        ></a-asset-item>
        <a-asset-item
          id="carModel1"
          src="models/trinity_03_-_low_poly_model.glb"
          alt="Low poly character model"
        ></a-asset-item>

        <img
          id="skyFieldTexture"
          src="textures/field-with-clouds.jpg"
          alt="Field with clouds sky texture"
        />

        <img
          id="grassNormalMap"
          src="textures/grass.png"
          alt="Grass normal map"
        />
        <img
          id="grassDiffuseTexture"
          src="textures/seamless-green-grass-pattern_1284-52275.jpg"
          alt="Seamless green grass texture"
        />
        <img
          id="stonePavementTexture"
          src="textures/stone-pavement_53876-30428.jpg"
          alt="Stone pavement texture"
        />
        <img
          id="stoneNormalMap"
          src="textures/stone.png"
          alt="Stone normal map"
        />
        <img id="tileNormalMap" src="textures/tile.png" alt="Tile normal map" />
        <img
          id="tileDiffuseTexture"
          src="textures/tile1.jpg"
          alt="Tile diffuse texture"
        />
      </a-assets>
      <a-sky src="#skyFieldTexture"> </a-sky>
      <a-entity
        light="type: ambient; color: #fff4dd; intensity: 0.55"
      ></a-entity>
      <a-entity
        light="type: directional; color: #fff1cf; intensity: 1.05"
        position="40 10 2"
      ></a-entity>
      <a-entity
        light="type: point; color: #8fd8ff; intensity: 0.8; distance: 20"
        position="9 1.5 -4"
        animation="property: light.intensity; from: 0.55; to: 1.05; dur: 1800; dir: alternate; loop: true; easing: easeInOutSine"
      ></a-entity>

      <a-entity id="cameraRig" position="40 1.5 20">
        <a-camera
          wasd-controls="acceleration: 35"
          look-controls="pointerLockEnabled: false"
          ><a-cursor color="#B7E10E"></a-cursor
        ></a-camera>
      </a-entity>

      <a-entity gltf-model="#villaModel" scale="1 1 1">
        <a-plane
          position="41.6 0 -16.5"
          rotation="-90 0 0"
          width="7.4"
          height="3.9"
          color="#0E9BE1"
          material="side: double; transparent: true; opacity: 0.86; metalness: 0.12; roughness: 0.15; depthWrite: false"
          geometry="primitive: plane; width: 5.95; height: 3.5; segmentsWidth: 44; segmentsHeight: 24"
        ></a-plane>
        <a-plane
          position="41.6 0.1 -16.5"
          rotation="-90 0 0"
          width="7.4"
          height="3.9"
          color="#44a8d9"
          material="side: double; transparent: true; opacity: 0.86; metalness: 0.12; roughness: 0.15; depthWrite: false"
          geometry="primitive: plane; width: 5.95; height: 3.5; segmentsWidth: 44; segmentsHeight: 24"
          pool-water="speed: 1.5; amplitude: 0.065; frequency: 4"
        ></a-plane>
        <a-entity
          id="bedroom1Entity"
          gltf-model="#isometricRoomModel"
          scale="0.7 0.4 0.7"
          rotation="0 270 0"
          position="31.2 4 -23"
        ></a-entity>
        <a-entity
          id="neonRoomEntity"
          gltf-model="#neonBedroomModel"
          scale="0.8 1.1 0.5"
          rotation="0 0 0"
          position="40 5.2 -26"
        >
        </a-entity>
        <a-entity
          id="livingRoomEntity"
          gltf-model="#livingRoomModel"
          scale="1 1.3 1"
          position="31.5 0.5 -20"
        ></a-entity>
        <a-entity
          id="kitchenEntity"
          gltf-model="#kitchenModel"
          scale="0.03 0.027 0.02"
          rotation="0 0 0"
          position="40.8 0.5 -22"
        >
        </a-entity>
      </a-entity>
      <a-entity>
        <a-plane
          rotation="-90 0 0"
          width="300"
          height="300"
          color="#80b57c"
          position="0 -0.02 0"
          src="#grassDiffuseTexture"
          material="repeat: 60 60; roughness: 1; metalness: 0; depthWrite: false"
        ></a-plane>

        <a-text
          value="WASD to move | 1-5 to navigate"
          position="40 4 10"
          align="center"
          color="#1d2d3f"
          width="18"
        ></a-text>
        <a-plane
          src="#stonePavementTexture"
          width="10"
          height="40"
          position="39 -0.1 -5"
          rotation="-90 0 0"
          material="side: double; repeat: 2 10; roughness: 1; metalness: 0; depthWrite: false"
          normal-map="#stoneNormalMap"
          normal-texture-scale="2 10"
        ></a-plane
        ><a-plane
          src="#tileDiffuseTexture"
          width="6"
          height="5"
          position="47 -0.1 -8"
          rotation="-90 0 0"
          material="side: double; repeat: 2 2; roughness: 1; metalness: 0; depthWrite: false"
          normal-map="#tileNormalMap"
          normal-texture-scale="2 2"
        ></a-plane
        ><a-plane
          src="#tileDiffuseTexture"
          width="9"
          height="29.6"
          position="53 -0.1 -20.3"
          rotation="-90 0 0"
          material="side: double; repeat: 4 12; roughness: 1; metalness: 0; depthWrite: false"
          normal-map="#tileNormalMap"
          normal-texture-scale="4 12"
        ></a-plane>
      </a-entity>
      <a-entity>
        <a-entity
          gltf-model="#carModel"
          position="53 0 -18"
          rotation="0 -90 0"
        ></a-entity>
        <a-entity gltf-model="#carModel1" position="53 0 -14"></a-entity>
      </a-entity>
      <a-entity>
        <a-entity
          gltf-model="#flowerBushesModel"
          position="38 0 -3"
          scale="1 0.4 0.4"
        ></a-entity>
        <a-entity
          gltf-model="#flowerBushesModel"
          position="38 0 3"
          scale="1 0.4 0.4"
        ></a-entity>
        <a-entity
          gltf-model="#flowerBushesModel"
          position="38 0 6"
          scale="1 0.4 0.4"
        ></a-entity>
        <a-entity
          gltf-model="#flowerBushesModel"
          position="38 0 12"
          scale="1 0.4 0.4"
        ></a-entity>
        <a-entity
          gltf-model="#greenBushModel"
          position="18 -1 -8"
          scale="0.03 0.03 0.03 "
        ></a-entity>
      </a-entity>
      <a-entity
        ><a-entity
          gltf-model="#deckChairModel"
          position="45.5 0 -16"
          scale="3 3 3"
          rotation="0 270 0"
        ></a-entity>

        <a-entity
          gltf-model="#benchModel"
          position="25 0 -3.5"
          scale="0.015 0.015 0.015"
          rotation="0 90 0"
        ></a-entity>

        <a-entity
          gltf-model="#mailboxModel"
          position="34 0 15"
          scale="0.2 0.2 0.1"
        ></a-entity>

        <a-entity
          gltf-model="#streetLampModel"
          position="23 0 -30"
          scale="0.8 0.8 0.8"
        ></a-entity>
        <a-entity
          gltf-model="#streetLampModel"
          position="49 0 -30"
          scale="0.8 0.8 0.8"
        ></a-entity>

        <a-entity
          gltf-model="#stylizedStreetLightModel"
          position="25 0 -11"
          scale="1.5 1.5 1.5"
        ></a-entity>
        <a-entity
          gltf-model="#stylizedStreetLightModel"
          position="47 0 -11"
          scale="1.5 1.5 1.5"
        ></a-entity>
      </a-entity>
    </a-scene>
  </body>
</html>
